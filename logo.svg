<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-label="Star Paper Logo">
  <defs>
    <linearGradient id="starBase" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2b313c"/>
      <stop offset="48%" stop-color="#101318"/>
      <stop offset="100%" stop-color="#040506"/>
    </linearGradient>
    <linearGradient id="starRim" x1="8%" y1="0%" x2="92%" y2="100%">
      <stop offset="0%" stop-color="#5a6371"/>
      <stop offset="55%" stop-color="#191f27"/>
      <stop offset="100%" stop-color="#2f3642"/>
    </linearGradient>
    <linearGradient id="goldFill" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffe7a4"/>
      <stop offset="46%" stop-color="#e9b656"/>
      <stop offset="100%" stop-color="#986317"/>
    </linearGradient>
    <linearGradient id="goldEdge" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fff2c8"/>
      <stop offset="100%" stop-color="#a6681e"/>
    </linearGradient>
    <linearGradient id="glassSweep" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.72"/>
      <stop offset="65%" stop-color="#ffffff" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <filter id="softShadow" x="-35%" y="-35%" width="170%" height="190%">
      <feDropShadow dx="0" dy="13" stdDeviation="10" flood-color="#000000" flood-opacity="0.42"/>
    </filter>
    <filter id="metalShadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="6" stdDeviation="3" flood-color="#000000" flood-opacity="0.45"/>
    </filter>
  </defs>

  <g id="soft-shadow" opacity="0.9">
    <ellipse cx="256" cy="418" rx="126" ry="18" fill="#000000" opacity="0.3"/>
  </g>

  <g id="base-shape" filter="url(#softShadow)">
    <polygon
      points="256,107.52 294.144,207.616 409.344,213.76 319.232,290.048 351.744,387.584 256,335.36 160.256,387.584 192.768,290.048 102.656,213.76 217.856,207.616"
      fill="url(#starBase)"
    />
  </g>

  <g id="edge-rim">
    <polygon
      points="256,107.52 294.144,207.616 409.344,213.76 319.232,290.048 351.744,387.584 256,335.36 160.256,387.584 192.768,290.048 102.656,213.76 217.856,207.616"
      fill="none"
      stroke="url(#starRim)"
      stroke-width="13"
      stroke-linejoin="round"
    />
  </g>

  <g id="glass-highlight">
    <polygon points="256,107.52 294.144,207.616 217.856,207.616" fill="url(#glassSweep)" opacity="0.95"/>
    <polygon points="127,228 197,279 170,343" fill="#ffffff" opacity="0.12"/>
    <path d="M297 211 C342 214 373 214 387 215 C361 225 340 232 309 232 Z" fill="#ffffff" opacity="0.14"/>
  </g>

  <g id="contact-occlusion">
    <ellipse cx="256" cy="226" rx="72" ry="15" fill="#000000" opacity="0.24"/>
    <ellipse cx="255" cy="301" rx="68" ry="16" fill="#000000" opacity="0.22"/>
  </g>

  <g id="metal-gold-chain" filter="url(#metalShadow)">
    <path d="M194 191 C218 163 294 163 318 191" fill="none" stroke="url(#goldFill)" stroke-width="20" stroke-linecap="round"/>
    <path d="M194 191 C218 163 294 163 318 191" fill="none" stroke="#8d5a16" stroke-width="5" stroke-linecap="round" opacity="0.55"/>
    <ellipse cx="195" cy="191" rx="10" ry="12" fill="url(#goldFill)" stroke="#8d5a16" stroke-width="2"/>
    <ellipse cx="318" cy="191" rx="10" ry="12" fill="url(#goldFill)" stroke="#8d5a16" stroke-width="2"/>
    <text x="256" y="332" text-anchor="middle" font-size="250" font-family="'Segoe UI Black', 'Arial Black', sans-serif" font-weight="900" fill="url(#goldFill)" stroke="url(#goldEdge)" stroke-width="6">$</text>
  </g>
</svg>
